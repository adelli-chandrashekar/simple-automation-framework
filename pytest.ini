[pytest]
# ── addopts: flags that run EVERY time you type 'pytest' ──────
# -v             = verbose — show each test name
# --tb=short     = short traceback on failure (not 50 lines)
# --strict-markers = error if you use an unregistered marker
# -p no:warnings = hide deprecation warnings
# --html=...     = generate an HTML report in the reports folder
addopts = -v --tb=short --strict-markers -p no:warnings --html=reports/report.html --self-contained-html

# ── testpaths: where pytest looks for tests ───────────────────
testpaths = tests

# ── markers: register your custom tags ────────────────────────
# Without registering, --strict-markers will throw an error.
#
# HOW TO USE MARKERS:
#   pytest -m api          → runs only @pytest.mark.api tests
#   pytest -m smoke        → runs only @pytest.mark.smoke tests
#   pytest -m "not smoke"  → runs everything EXCEPT smoke tests
#   pytest -m "api and smoke" → runs tests with BOTH markers
markers =
    api: API test cases
    ui: Selenium UI test cases
    smoke: Critical path tests (must pass before deploy)
    regression: Full regression suite

# ── log_cli: show logging output in terminal ──────────────────
# This is how logger.info() messages appear during test runs
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(message)s
log_cli_date_format = %H:%M:%S

# ── log_file: save logging output to a file ───────────────────
# Automatically writes a beautiful, timestamped log file.
log_file = logs/automation.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
