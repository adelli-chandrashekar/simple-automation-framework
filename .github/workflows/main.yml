name: Automation Test Pipeline

# This block tells GitHub when to run the tests.
# In this case, it runs every time someone pushes code to the "main" branch.
on:
  push:
    branches:
      - main

jobs:
  test:
    # We tell GitHub to use a brand new, clean Ubuntu Linux server in the cloud
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the cloud server
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install our dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run API Tests
      - name: Run API Tests
        run: pytest -m api -v --html=reports/api_report.html

      # Step 5: Run UI Tests
      # Note: We don't need a browser installed manually because GitHub's ubuntu-latest
      # already has Chrome pre-installed, and webdriver-manager will handle the rest!
      - name: Run UI Tests
        run: pytest -m ui -v --html=reports/ui_report.html

      # Step 6: Save the HTML reports so we can view them later
      # This runs "always()" so it saves the reports even if a test fails
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: reports/*.html
